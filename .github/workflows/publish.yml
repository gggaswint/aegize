name: Publish to PyPI

# Publishes Aegize to PyPI using PyPI Trusted Publishing (OIDC) — no API token
# is stored in GitHub. Runs when a GitHub Release is published; can also be run
# manually (Actions tab -> Run workflow) for the first release.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check distributions render and are valid
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The GitHub Environment the PyPI Trusted Publisher is scoped to.
    environment:
      name: pypi
      url: https://pypi.org/project/aegize/
    permissions:
      # Required for Trusted Publishing (OIDC). No PyPI token needed.
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
